<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Au Feu Dormant - Console RP</title>
  <meta name="description" content="Prototype V2 d'application RP pour joueurs et maitre de jeu.">
  <link rel="stylesheet" href="assets/css/app.css?v=20260714523000">
</head>
<body>
  <section id="auth-shell" class="auth-shell" hidden aria-labelledby="auth-title">
    <div class="auth-panel">
      <span class="brand-mark auth-mark">AFD</span>
      <p class="eyebrow">Portail securise</p>
      <h1 id="auth-title">Ouvrir mon registre</h1>
      <p>Recevez un lien de connexion par e-mail. Aucun mot de passe joueur n'est necessaire.</p>
      <form id="magic-link-form" class="auth-form">
        <label for="auth-email">Adresse e-mail</label>
        <input id="auth-email" name="email" type="email" autocomplete="email" required placeholder="vous@exemple.fr">
        <button type="submit" class="primary-button">Recevoir mon lien</button>
      </form>
      <p id="auth-message" class="auth-message" role="status" aria-live="polite"></p>
    </div>
  </section>

  <div id="app-shell" class="app-frame">
    <aside class="sidebar" aria-label="Navigation principale">
      <div class="brand">
        <span class="brand-mark">AFD</span>
        <div>
          <strong>Au Feu Dormant</strong>
          <small>Console RP</small>
        </div>
      </div>

      <nav class="nav-list">
        <button data-view="dashboard" class="active">Vue generale</button>
        <button data-view="player">Ma fiche</button>
        <button data-view="skills">Competences</button>
        <button data-view="talents">Talents</button>
        <button data-view="quests">Quetes</button>
        <button data-view="factions">Allegeances</button>
        <button data-view="vault">Coffre</button>
        <button data-view="requests">Demandes MJ</button>
        <button data-view="gm">Atelier MJ</button>
      </nav>

      <div class="sidebar-footer">
        <p id="connection-status" class="connection-status">Mode local</p>
        <button class="ghost-button" data-sign-out hidden>Se deconnecter</button>
        <button class="ghost-button" data-export>Exporter</button>
        <button class="ghost-button danger" data-reset>Reinitialiser</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="view-kicker">Prototype V2</p>
          <h1 id="view-title">Tableau de bord RP</h1>
        </div>
        <div class="mode-switch" aria-label="Mode actif">
          <label class="character-switcher">Fiche active
            <select id="character-switcher" data-active-character></select>
          </label>
          <button type="button" data-role="player" class="active">Joueur</button>
          <button type="button" data-role="gm">MJ</button>
        </div>
      </header>

      <section id="main-panel" class="main-panel" tabindex="-1"></section>
    </main>

    <aside id="context-panel" class="context-panel" aria-label="Contexte"></aside>
  </div>

  <div id="modal-root" class="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/data.js?v=2026071601"></script>
    <script src="assets/js/online.js?v=2026071602"></script>
    <script src="assets/js/app.js?v=2026071602"></script>
</body>
</html>
